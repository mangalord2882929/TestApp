name: Generate Android Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Copy Sample Environment File
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          fi

      - name: Set up Signing Credentials
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Using custom signing key from secrets..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 -d > my-upload-key.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/my-upload-key.jks" >> $GITHUB_ENV
          else
            echo "No custom signing key provided. Generating a compilation signing key..."
            keytool -genkeypair -v -keystore my-upload-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -dname "CN=ChronosSync, OU=AIStudio, O=Google, L=Mountain View, S=California, C=US" -storepass android -keypass android
            echo "STORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/my-upload-key.jks" >> $GITHUB_ENV
          fi

      - name: Run Tests
        run: gradle testDebugUnitTest --no-daemon

      - name: Build Release APK and App Bundle
        env:
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
        run: gradle assembleRelease bundleRelease --no-daemon

      - name: Determine Target Version and Release Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "title=Release ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "title=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest-dev" >> $GITHUB_OUTPUT
            echo "title=Latest Development Build (Unstable)" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: ${{ steps.get_tag.outputs.title }}
          draft: ${{ steps.get_tag.outputs.draft == 'true' }}
          prerelease: ${{ steps.get_tag.outputs.prerelease == 'true' }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
